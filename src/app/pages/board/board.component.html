<div id="background">
  <app-navbar
    style="z-index: 1000"
    #navbar
    [isClockVisible]="true"
    [isLogoutVisible]="true"
  ></app-navbar>

  <ng-template
    #defaultNavbarTemplate
    let-getIsSearchOpen="getIsSearchOpen"
    let-toggleSearch="toggleSearch"
  >
    <div class="bar" *ngIf="!getIsSearchOpen()">
      <div class="board-navbar-controls">
        <button
          class="board-search-button"
          type="button"
          (click)="toggleSearch()"
          aria-label="Search boards"
          title="Search boards"
        >
          <span>Search boards</span>
        </button>
      </div>
    </div>
  </ng-template>

  <div class="board-container" #board>
    <div *ngIf="isSearchOpen">
      <div class="search" *ngIf="boards$ | async as boards">
        <section
          class="search-window"
          [class.is-fixed]="
            isCreateOpen ||
            (searchQuery.length > 0 && filteredBoards(boards).length === 0)
          "
          aria-label="Board search"
          (wheel)="$event.stopPropagation()"
          (click)="onSearchWindowClick($event)"
        >
          <!-- Top command bar -->
          <div class="command-bar">
            <app-svg-icon class="command-icon" icon="search"></app-svg-icon>

            <input
              *ngIf="!isCreateOpen"
              class="command-input"
              type="text"
              #searchInput
              [(ngModel)]="searchQuery"
              (keydown.enter)="onSearchEnter(boards)"
              placeholder="Search boards or create one…"
              autocomplete="off"
              spellcheck="false"
            />

            <button
              *ngIf="!isCreateOpen && searchQuery.length"
              class="command-clear"
              type="button"
              (click)="clearSearchQuery()"
            >
              Clear
            </button>

            <span *ngIf="isCreateOpen" class="command-title">
              Create board
            </span>

            <button
              class="command-close"
              type="button"
              (click)="isCreateOpen ? toggleCreateState() : toggleSearchState()"
            >
              <app-svg-icon
                [icon]="isCreateOpen ? 'chevron-left' : 'close-x'"
              ></app-svg-icon>
            </button>
          </div>

          <!-- Results -->
          <ng-container *ngIf="!isCreateOpen; else createMode">
            <div class="command-results">
              <ng-container
                *ngIf="
                  filteredBoards(boards).length || searchQuery.length === 0;
                  else noResults
                "
              >
                <button
                  class="command-item"
                  *ngFor="let b of filteredBoards(boards)"
                  (click)="selectBoard(b.id)"
                >
                  <span class="command-item-title">{{ b.name }}</span>
                  <span class="command-item-subtitle">{{ b.description }}</span>
                </button>

                <button
                  class="command-item command-create"
                  type="button"
                  (click)="openCreateFromSearch(boards)"
                >
                  + Create board
                </button>
              </ng-container>

              <ng-template #noResults>
                <div class="command-empty">
                  No boards found — press enter to create one
                </div>
              </ng-template>
            </div>
          </ng-container>

          <!-- Create mode -->
          <ng-template #createMode>
            <div class="create-panel">
              <label class="create-field">
                <span>Name</span>
                <input
                  class="command-input"
                  type="text"
                  #newBoardNameInput
                  [(ngModel)]="newBoardName"
                  [class.is-invalid]="newBoardNameTouched && !isCreateNameValid"
                  [attr.placeholder]="
                    newBoardNameTouched && !isCreateNameValid
                      ? 'Name is required'
                      : 'e.g. Cooking'
                  "
                />
              </label>

              <label class="create-field">
                <span>Description</span>
                <textarea
                  class="command-textarea"
                  rows="3"
                  placeholder="What is this board about?"
                  [(ngModel)]="newBoardDescription"
                ></textarea>
              </label>

              <div class="create-actions">
                <button
                  class="primary"
                  type="button"
                  (click)="submitNewBoardRequest()"
                >
                  Create
                </button>
                <button
                  class="secondary"
                  type="button"
                  (click)="toggleCreateState()"
                >
                  Cancel
                </button>
              </div>
            </div>
          </ng-template>
        </section>
      </div>
    </div>

    <div class="board-viewport" #viewport>
      <div #itemsContainer>
        <ng-container *ngFor="let item of tiles">
          <app-board-tile
            [tile]="item"
            [zoom]="zoom"
            (dblclick)="centerOnItem(item)"
            (navbarChange)="onTileNavbarChange($event)"
            *ngIf="isItemVisible(item)"
          >
          </app-board-tile>
        </ng-container>
      </div>

      <div style="display: block">
        <ng-container *ngFor="let connector of connectors">
          <app-board-connector
            [data]="connector"
            [zoom]="zoom"
            (click)="moveToItem(connector.itemB)"
          >
          </app-board-connector>
        </ng-container>
      </div>
    </div>
  </div>

  <app-context-menu
    [visible]="ctxMenu.visible"
    [x]="ctxMenu.x"
    [y]="ctxMenu.y"
    [items]="ctxMenu.items"
    (closed)="closeContextMenu()"
    (itemSelected)="onContextMenuItem($event)"
  ></app-context-menu>
</div>
